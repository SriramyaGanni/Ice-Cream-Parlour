<!DOCTYPE html>
<html>
<head>
<title>Order Success</title>

<style>
body{
    margin:0;
    font-family: Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#43e97b,#38f9d7);
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: pop 0.5s ease;
}

h1{
    color:#2ecc71;
}

p{
    font-size:16px;
    color:#555;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#ff4d6d;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#e84393;
}

@keyframes pop{
    from{transform:scale(0.7);opacity:0;}
    to{transform:scale(1);opacity:1;}
}
</style>

</head>
<body>

<div class="card">
    <h1>🎉 Thank You!</h1>
    <p>Your ice cream order has been placed successfully.</p>
    <p><b>You will receive it soon 🍦</b></p>

    <button onclick="window.location.href='index.html'">
        Back to Home
    </button>
</div>

</body>
</html>
